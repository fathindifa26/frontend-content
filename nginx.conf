server {
    listen 80;
    
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend if needed, 
    # but since we use API_BASE_URL in the browser, 
    # the browser will call the backend port directly.
    # If we wanted to hide the backend port, we could proxy here.
}
